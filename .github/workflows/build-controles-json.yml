name: Build controles.json

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    paths:
      - 'sources/**'
      - 'generate_controles_json.py'
      - '.github/workflows/build-controles-json.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl xlrd

      - name: Build controles.json
        run: python generate_controles_json.py

      - name: Commit updated JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/controles.json
          if git diff --cached --quiet; then
            echo "Aucun changement sur data/controles.json"
          else
            git commit -m "chore: update data/controles.json"
            git push
          fi
